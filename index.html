<!DOCTYPE html>
<html lang="de" class="scroll-smooth h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stadtwerke Hamburg - Bürger- & Karriereportal</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter, Playfair & Caveat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght=1,600&family=Caveat:wght=700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- jsPDF Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        signature: ['Caveat', 'cursive'],
                    },
                    colors: {
                        swBlue: {
                            50: '#f0f7ff',
                            100: '#e0effe',
                            500: '#0284c7',
                            800: '#075985',
                            900: '#0c4a6e',
                        },
                        swOrange: {
                            500: '#f97316',
                            600: '#ea580c',
                            700: '#c2410c',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* SVG Map Styles */
        svg {
            touch-action: none;
            user-select: none;
        }
        .map-container {
            overflow: hidden;
            position: relative;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border: 1px solid #dee2e6;
        }
        .legend-toggle {
            transition: all 0.3s ease;
        }
        .legend-toggle.disabled {
            opacity: 0.5;
            filter: grayscale(100%);
        }
        .zoom-controls {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .zoom-btn {
            width: 40px;
            height: 40px;
            border: 1px solid #dee2e6;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-weight: bold;
            color: #0c4a6e;
        }
        .zoom-btn:hover {
            background: #f0f7ff;
            border-color: #0284c7;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-full font-sans antialiased flex flex-col justify-between">

    <header class="sticky top-0 z-40 bg-white/95 backdrop-blur-md border-b border-slate-200 shadow-sm transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <!-- Logo Block -->
                <div class="flex items-center space-x-3 cursor-pointer" onclick="switchPage('startseite')">
                    <div class="w-11 h-11 rounded-xl bg-gradient-to-tr from-swBlue-800 to-swBlue-500 flex items-center justify-center text-white shadow-md">
                        <i class="fa-solid fa-industry text-lg"></i>
                    </div>
                    <div>
                        <span class="text-base font-extrabold tracking-tight text-swBlue-900 block leading-tight">STADTWERKE</span>
                        <span class="text-[10px] font-semibold uppercase tracking-widest text-swOrange-600 block leading-none">HAMBURG</span>
                    </div>
                </div>
                
                <!-- Navigation Links -->
                <nav class="hidden md:flex space-x-2 items-center">
                    <button id="nav-home" onclick="switchPage('startseite')" class="text-swBlue-800 bg-swBlue-50 px-4 py-2 rounded-xl font-bold text-sm transition-all duration-200 border border-tr[...]
                        <i class="fa-solid fa-house mr-2"></i>Startseite
                    </button>
                    <button id="nav-order" onclick="switchPage('auftrag')" class="text-slate-600 hover:text-swBlue-800 px-4 py-2 rounded-xl font-semibold text-sm transition-all duration-200 border[...]
                        <i class="fa-solid fa-file-invoice mr-2"></i>Auftrag einreichen
                    </button>
                    <button id="nav-muell" onclick="switchPage('muell')" class="text-slate-600 hover:text-swBlue-800 px-4 py-2 rounded-xl font-semibold text-sm transition-all duration-200 border b[...]
                        <i class="fa-solid fa-calendar-days mr-2"></i>Müll Plan
                    </button>

                    <!-- Karriere Dropdown (öffentlich, für alle Besucher sichtbar) -->
                    <div class="relative group py-2">
                        <button class="text-slate-600 hover:text-swBlue-800 px-4 py-1.5 rounded-xl font-semibold text-sm transition-all duration-200 flex items-center">
                            <i class="fa-solid fa-user-tie mr-2"></i>Karriere <i class="fa-solid fa-chevron-down ml-1.5 text-[10px]"></i>
                        </button>
                        <!-- Hover Dropdown Menu Wrapper with seamless padding bridge -->
                        <div class="absolute left-0 top-full w-56 pt-2 hidden group-hover:block z-50">
                            <div class="bg-white border border-slate-200 rounded-2xl shadow-xl py-2 transition-all duration-300">
                                <button onclick="switchPage('karriere')" class="w-full text-left px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 hover:text-swBlue-800 font-semibold flex items[...]
                                    <i class="fa-solid fa-paper-plane text-slate-400"></i>
                                    <span>Online Bewerben</span>
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Protected Employee Dropdown (Visible only when logged in with level >= 1) -->
                    <div id="nav-mitarbeiter-dropdown" class="relative group hidden py-2">
                        <button class="text-slate-600 hover:text-swBlue-800 px-4 py-1.5 rounded-xl font-semibold text-sm transition-all duration-200 flex items-center">
                            <i class="fa-solid fa-briefcase mr-2"></i>Mitarbeiter <i class="fa-solid fa-chevron-down ml-1.5 text-[10px]"></i>
                        </button>
                        <!-- Hover Dropdown Menu Wrapper with seamless padding bridge -->
                        <div class="absolute left-0 top-full w-56 pt-2 hidden group-hover:block z-50">
                            <div class="bg-white border border-slate-200 rounded-2xl shadow-xl py-2 transition-all duration-300">
                                <!-- Stufe 1, 2, 3 -->
                                <button onclick="switchPage('arbeitsvertrag')" class="w-full text-left px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 hover:text-swBlue-800 font-semibold fle[...]
                                    <i class="fa-solid fa-file-signature text-slate-400"></i>
                                    <span>Arbeitsvertrag</span>
                                </button>
                                <!-- Stufe 1, 2, 3 -->
                                <button onclick="switchPage('stadtplan')" class="w-full text-left px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 hover:text-swBlue-800 font-semibold flex ite[...]
                                    <i class="fa-solid fa-map-location-dot text-slate-400"></i>
                                    <span>Stadtplan</span>
                                </button>
                                <!-- Stufe 1, 2, 3 -->
                                <button id="menu-btn-meldungen" onclick="switchPage('meldungen')" class="w-full text-left px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 hover:text-swBlue-80[...]
                                    <i class="fa-solid fa-list-check text-slate-400"></i>
                                    <span>Meldungen verwalten</span>
                                </button>
                                <!-- Stufe 1, 2, 3 -->
                                <button id="menu-btn-statusmeldungen" onclick="switchPage('statusmeldungen')" class="w-full text-left px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 hover:te[...]
                                    <i class="fa-solid fa-bullhorn text-slate-400"></i>
                                    <span>Statusmeldungen</span>
                                </button>
                                <!-- Stufe 3 -->
                                <button id="menu-btn-mitglieder" onclick="switchPage('mitglieder')" class="w-full text-left px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 hover:text-swBlue-[...]
                                    <i class="fa-solid fa-users-gear text-slate-400"></i>
                                    <span>Mitglieder verwalten</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </nav>
                
                <!-- Interactive Controls & Auth Section -->
                <div class="flex items-center space-x-3">
                    <!-- Login Button -->
                    <button id="login-trigger-btn" onclick="openLoginModal()" class="bg-swBlue-800 hover:bg-swBlue-900 text-white font-bold py-2 px-4 rounded-xl text-xs sm:text-sm transition-all [...]
                        <i class="fa-solid fa-user-tie"></i>
                        <span>Mitarbeiter Login</span>
                    </button>

                    <!-- Logged in Status Badge -->
                    <div id="user-profile-badge" class="hidden bg-slate-100 border border-slate-200 pl-3 pr-2 py-1.5 rounded-xl flex items-center space-x-2 text-xs">
                        <i class="fa-solid fa-circle-user text-swBlue-800 text-sm"></i>
                        <div class="flex flex-col">
                            <span id="header-username" class="font-bold text-slate-800 leading-tight">Mitarbeiter</span>
                            <span id="header-userlevel" class="text-[9px] text-slate-400 font-semibold uppercase leading-none">Stufe 0</span>
                        </div>
                        <button onclick="handleLogout()" class="w-7 h-7 rounded-lg bg-white border border-slate-200 text-slate-400 hover:text-rose-600 hover:bg-rose-50 transition flex items-cente[...]
                            <i class="fa-solid fa-power-off text-xs"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="py-8 flex-grow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <!-- VIEW: STADTPLAN / VERSORGUNGSNETZ mit Vektorkarte (Stufe 1+) -->
            <div id="view-stadtplan" class="hidden max-w-7xl mx-auto">
                <div class="mb-6">
                    <div class="bg-white rounded-3xl border border-slate-200 shadow-xl overflow-hidden">
                        <div class="bg-gradient-to-r from-swBlue-900 to-swBlue-800 px-6 py-8 text-white">
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                <div>
                                    <h2 class="text-xl sm:text-2xl font-extrabold flex items-center space-x-2">
                                        <i class="fa-solid fa-map"></i>
                                        <span>Stadtplan – Versorgungsnetz</span>
                                    </h2>
                                    <p class="text-sm text-slate-300 mt-1">Interaktive Vektorkarte mit Zoom, Pan und Lagenfiltration</p>
                                </div>
                                <div class="bg-swOrange-500 border border-swOrange-600 px-3 py-1.5 rounded-lg text-xs font-semibold self-start sm:self-center">Nur für Mitarbeiter</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex gap-6">
                    <!-- Main Map Area -->
                    <div class="flex-1 bg-white rounded-2xl border border-slate-200 shadow-lg overflow-hidden relative" style="height: 600px;">
                        <div class="map-container h-full relative" id="mapContainer">
                            <svg id="mapSVG" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
                                <!-- Defs für Gradienten -->
                                <defs>
                                    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" style="stop-color:#e0f2fe;stop-opacity:1" />
                                        <stop offset="100%" style="stop-color:#bae6fd;stop-opacity:1" />
                                    </linearGradient>
                                    <pattern id="gridPattern" x="50" y="50" width="100" height="100" patternUnits="userSpaceOnUse">
                                        <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#e5e7eb" stroke-width="1"/>
                                    </pattern>
                                </defs>

                                <!-- Background -->
                                <g id="backgroundLayer">
                                    <rect width="1000" height="800" fill="url(#gridPattern)"/>
                                    <rect width="1000" height="800" fill="white" opacity="0.3"/>
                                </g>

                                <!-- Wasser -->
                                <g id="waterLayer" class="infrastructure-layer" data-type="wasser">
                                    <path d="M 0 600 Q 250 580 500 590 T 1000 600 L 1000 800 L 0 800 Z" fill="url(#waterGrad)" stroke="#7dd3fc" stroke-width="2" opacity="0.8"/>
                                    <circle cx="200" cy="400" r="80" fill="url(#waterGrad)" stroke="#7dd3fc" stroke-width="1.5" opacity="0.6"/>
                                </g>

                                <!-- Parks -->
                                <g id="parkLayer" class="infrastructure-layer" data-type="parks">
                                    <rect x="50" y="50" width="200" height="150" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" rx="10" opacity="0.7"/>
                                    <rect x="700" y="100" width="250" height="200" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" rx="10" opacity="0.7"/>
                                    <circle cx="850" cy="450" r="60" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>
                                </g>

                                <!-- Straßen -->
                                <g id="roadsLayer" class="infrastructure-layer" data-type="strassen">
                                    <line x1="0" y1="300" x2="1000" y2="300" stroke="#fbbf24" stroke-width="8" opacity="0.8"/>
                                    <line x1="500" y1="0" x2="500" y2="800" stroke="#fbbf24" stroke-width="7" opacity="0.8"/>
                                    <line x1="0" y1="150" x2="1000" y2="150" stroke="#f59e0b" stroke-width="6" opacity="0.7"/>
                                    <line x1="200" y1="0" x2="200" y2="800" stroke="#f59e0b" stroke-width="5" opacity="0.7"/>
                                    <line x1="0" y1="450" x2="600" y2="450" stroke="#fed7aa" stroke-width="3" opacity="0.6"/>
                                    <line x1="300" y1="0" x2="300" y2="600" stroke="#fed7aa" stroke-width="3" opacity="0.6"/>
                                </g>

                                <!-- Stromleitung -->
                                <g id="stromLayer" class="infrastructure-layer" data-type="strom" stroke="#f59e0b" stroke-width="3" fill="none" opacity="0.8" stroke-dasharray="5,5">
                                    <path d="M 100 200 Q 300 150 500 200 T 900 200"/>
                                    <path d="M 150 250 Q 350 300 550 250 T 950 250"/>
                                    <path d="M 50 350 L 950 350"/>
                                    <circle cx="250" cy="200" r="4" fill="#f59e0b"/>
                                    <circle cx="500" cy="200" r="4" fill="#f59e0b"/>
                                    <circle cx="750" cy="200" r="4" fill="#f59e0b"/>
                                </g>

                                <!-- Wasserleitung -->
                                <g id="wasserLayer" class="infrastructure-layer" data-type="wasser-leitung" stroke="#0284c7" stroke-width="2.5" fill="none" opacity="0.8">
                                    <path d="M 50 150 L 200 150 L 200 400 L 900 400"/>
                                    <path d="M 100 300 L 600 300 L 600 500"/>
                                    <path d="M 300 100 L 300 700"/>
                                    <circle cx="200" cy="150" r="3.5" fill="#0284c7"/>
                                    <circle cx="600" cy="300" r="3.5" fill="#0284c7"/>
                                    <circle cx="300" cy="400" r="3.5" fill="#0284c7"/>
                                </g>

                                <!-- Kanalisation -->
                                <g id="kanalLayer" class="infrastructure-layer" data-type="kanal" stroke="#6b7280" stroke-width="2.5" fill="none" opacity="0.8" stroke-dasharray="3,3">
                                    <path d="M 0 500 Q 250 480 500 500 T 1000 500"/>
                                    <path d="M 150 350 L 850 350 L 850 600"/>
                                    <circle cx="400" cy="500" r="3.5" fill="#6b7280"/>
                                    <circle cx="850" cy="475" r="3.5" fill="#6b7280"/>
                                </g>

                                <!-- Fernwärme -->
                                <g id="waermeLayer" class="infrastructure-layer" data-type="fernwaerme" stroke="#ef4444" stroke-width="2.5" fill="none" opacity="0.8" stroke-dasharray="2,4">
                                    <path d="M 300 50 L 300 200 L 700 200 L 700 650"/>
                                    <path d="M 600 100 L 600 250"/>
                                    <circle cx="300" cy="100" r="3.5" fill="#ef4444"/>
                                    <circle cx="700" cy="250" r="3.5" fill="#ef4444"/>
                                </g>

                                <!-- Telekommunikation -->
                                <g id="telekomLayer" class="infrastructure-layer" data-type="telekom" stroke="#a855f7" stroke-width="2.5" fill="none" opacity="0.8" stroke-dasharray="1,5">
                                    <path d="M 50 100 L 950 100 L 950 550"/>
                                    <path d="M 400 50 L 400 700"/>
                                    <circle cx="250" cy="100" r="3.5" fill="#a855f7"/>
                                    <circle cx="950" cy="300" r="3.5" fill="#a855f7"/>
                                </g>

                                <!-- Marker -->
                                <g id="markersLayer">
                                    <circle cx="300" cy="250" r="8" fill="#ef4444" stroke="white" stroke-width="2" class="marker normal" data-id="1" data-label="Hauptstraße 45"/>
                                    <circle cx="600" cy="400" r="8" fill="#3b82f6" stroke="white" stroke-width="2" class="marker normal" data-id="2" data-label="Nebenstraße 12"/>
                                    <circle cx="750" cy="300" r="8" fill="#10b981" stroke="white" stroke-width="2" class="marker completed" data-id="3" data-label="Ausgetauscht"/>
                                </g>
                            </svg>
                        </div>

                        <!-- Zoom Controls -->
                        <div class="absolute top-6 right-6 flex flex-col gap-2 z-40">
                            <div class="zoom-controls">
                                <button class="zoom-btn" onclick="zoomMap(1.2)" title="Vergrößern">
                                    <i class="fa-solid fa-plus"></i>
                                </button>
                                <button class="zoom-btn" onclick="zoomMap(0.8)" title="Verkleinern">
                                    <i class="fa-solid fa-minus"></i>
                                </button>
                                <button class="zoom-btn" onclick="resetZoom()" title="Zurücksetzen">
                                    <i class="fa-solid fa-expand"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Legend & Filter Panel -->
                    <div class="w-80 bg-white rounded-2xl border border-slate-200 shadow-lg p-6 overflow-y-auto custom-scrollbar" style="max-height: 600px;">
                        <h3 class="text-lg font-bold text-slate-900 mb-6 flex items-center gap-2">
                            <i class="fa-solid fa-layer-group text-blue-600"></i>
                            Legendenfilter
                        </h3>

                        <div class="space-y-3">
                            <label class="legend-toggle flex items-center gap-3 cursor-pointer p-3 rounded-xl hover:bg-slate-50 transition" data-layer="roadsLayer">
                                <input type="checkbox" checked class="w-5 h-5 text-yellow-500 rounded cursor-pointer">
                                <div class="flex-1 min-w-0">
                                    <p class="font-semibold text-slate-900 text-sm">Straßen & Wege</p>
                                    <p class="text-xs text-slate-500">Hauptstraßen und Nebenstraßen</p>
                                </div>
                            </label>

                            <label class="legend-toggle flex items-center gap-3 cursor-pointer p-3 rounded-xl hover:bg-slate-50 transition" data-layer="stromLayer">
                                <input type="checkbox" checked class="w-5 h-5 text-amber-500 rounded cursor-pointer">
                                <div class="flex-1 min-w-0">
                                    <p class="font-semibold text-slate-900 text-sm">Stromleitung</p>
                                    <p class="text-xs text-slate-500">Hochspannung & Verteilung</p>
                                </div>
                            </label>

                            <label class="legend-toggle flex items-center gap-3 cursor-pointer p-3 rounded-xl hover:bg-slate-50 transition" data-layer="wasserLayer">
                                <input type="checkbox" checked class="w-5 h-5 text-blue-500 rounded cursor-pointer">
                                <div class="flex-1 min-w-0">
                                    <p class="font-semibold text-slate-900 text-sm">Wasserversorgung</p>
                                    <p class="text-xs text-slate-500">Leitungsnetz Trinkwasser</p>
                                </div>
                            </label>

                            <label class="legend-toggle flex items-center gap-3 cursor-pointer p-3 rounded-xl hover:bg-slate-50 transition" data-layer="kanalLayer">
                                <input type="checkbox" checked class="w-5 h-5 text-gray-500 rounded cursor-pointer">
                                <div class="flex-1 min-w-0">
                                    <p class="font-semibold text-slate-900 text-sm">Kanalisation</p>
                                    <p class="text-xs text-slate-500">Abwassernetz & Entwässerung</p>
                                </div>
                            </label>

                            <label class="legend-toggle flex items-center gap-3 cursor-pointer p-3 rounded-xl hover:bg-slate-50 transition" data-layer="waermeLayer">
                                <input type="checkbox" checked class="w-5 h-5 text-red-500 rounded cursor-pointer">
                                <div class="flex-1 min-w-0">
                                    <p class="font-semibold text-slate-900 text-sm">Fernwärme</p>
                                    <p class="text-xs text-slate-500">Heizungsversorgung</p>
                                </div>
                            </label>

                            <label class="legend-toggle flex items-center gap-3 cursor-pointer p-3 rounded-xl hover:bg-slate-50 transition" data-layer="telekomLayer">
                                <input type="checkbox" checked class="w-5 h-5 text-purple-500 rounded cursor-pointer">
                                <div class="flex-1 min-w-0">
                                    <p class="font-semibold text-slate-900 text-sm">Telekommunikation</p>
                                    <p class="text-xs text-slate-500">Internet & Breitbandnetz</p>
                                </div>
                            </label>

                            <label class="legend-toggle flex items-center gap-3 cursor-pointer p-3 rounded-xl hover:bg-slate-50 transition" data-layer="waterLayer">
                                <input type="checkbox" checked class="w-5 h-5 text-cyan-500 rounded cursor-pointer">
                                <div class="flex-1 min-w-0">
                                    <p class="font-semibold text-slate-900 text-sm">Gewässer</p>
                                    <p class="text-xs text-slate-500">Elbe, Kanäle, Seen</p>
                                </div>
                            </label>

                            <label class="legend-toggle flex items-center gap-3 cursor-pointer p-3 rounded-xl hover:bg-slate-50 transition" data-layer="parkLayer">
                                <input type="checkbox" checked class="w-5 h-5 text-green-500 rounded cursor-pointer">
                                <div class="flex-1 min-w-0">
                                    <p class="font-semibold text-slate-900 text-sm">Parks & Grünflächen</p>
                                    <p class="text-xs text-slate-500">Öffentliche Grünanlagen</p>
                                </div>
                            </label>
                        </div>

                        <div class="mt-8 pt-6 border-t border-slate-200">
                            <h4 class="font-semibold text-slate-900 text-sm mb-4">Markierungen</h4>
                            <div class="space-y-3">
                                <div class="flex items-center gap-3">
                                    <div class="w-4 h-4 rounded-full bg-red-500 border border-white shadow"></div>
                                    <span class="text-xs text-slate-600">Normaler Punkt</span>
                                </div>
                                <div class="flex items-center gap-3">
                                    <div class="w-4 h-4 rounded-full bg-blue-500 border border-white shadow"></div>
                                    <span class="text-xs text-slate-600">Störung / Arbeit</span>
                                </div>
                                <div class="flex items-center gap-3">
                                    <div class="w-4 h-4 rounded-full bg-green-500 border border-white shadow"></div>
                                    <span class="text-xs text-slate-600">Fertiggestellt</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Placeholder für andere Views (Startseite, Auftrag, etc.) -->
            <div id="view-startseite" class="space-y-12">
                <!-- Platzhalter für andere Inhalte -->
                <div class="bg-gradient-to-r from-swBlue-900 via-swBlue-800 to-slate-900 rounded-3xl p-8 sm:p-12 shadow-2xl text-white text-center">
                    <h1 class="text-4xl font-extrabold">Willkommen bei Stadtwerke Hamburg</h1>
                    <p class="text-slate-300 mt-4">Nutzen Sie unsere digitalen Services</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Map zoom & pan
        let currentZoom = 1;
        let panX = 0;
        let panY = 0;
        let isDragging = false;
        let lastX = 0;
        let lastY = 0;

        const svg = document.getElementById('mapSVG');
        const mapContainer = document.getElementById('mapContainer');
        const legendToggles = document.querySelectorAll('.legend-toggle');

        function zoomMap(factor) {
            currentZoom *= factor;
            updateTransform();
        }

        function resetZoom() {
            currentZoom = 1;
            panX = 0;
            panY = 0;
            updateTransform();
        }

        function updateTransform() {
            svg.style.transform = `translate(${panX}px, ${panY}px) scale(${currentZoom})`;
            svg.style.transformOrigin = '0 0';
        }

        // Mouse controls
        mapContainer.addEventListener('wheel', (e) => {
            e.preventDefault();
            const factor = e.deltaY > 0 ? 0.9 : 1.1;
            zoomMap(factor);
        });

        mapContainer.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
            mapContainer.style.cursor = 'grabbing';
        });

        mapContainer.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - lastX;
            const dy = e.clientY - lastY;
            panX += dx;
            panY += dy;
            lastX = e.clientX;
            lastY = e.clientY;
            updateTransform();
        });

        mapContainer.addEventListener('mouseup', () => {
            isDragging = false;
            mapContainer.style.cursor = 'crosshair';
        });

        mapContainer.addEventListener('mouseleave', () => {
            isDragging = false;
            mapContainer.style.cursor = 'crosshair';
        });

        // Legend filter
        legendToggles.forEach(toggle => {
            toggle.addEventListener('change', (e) => {
                const layerName = toggle.dataset.layer;
                const layer = document.getElementById(layerName);
                const isChecked = e.target.checked;

                if (isChecked) {
                    layer.style.opacity = '0.8';
                    toggle.classList.remove('disabled');
                } else {
                    layer.style.opacity = '0';
                    toggle.classList.add('disabled');
                }
            });
        });

        // Marker interaction
        document.querySelectorAll('.marker').forEach(marker => {
            marker.addEventListener('click', (e) => {
                e.stopPropagation();
                const label = marker.dataset.label;
                alert(`Punkt: ${label}`);
            });

            marker.addEventListener('mouseover', () => {
                marker.style.r = '12';
                marker.style.filter = 'drop-shadow(0 0 8px rgba(0,0,0,0.4))';
            });

            marker.addEventListener('mouseout', () => {
                marker.style.r = '8';
                marker.style.filter = 'none';
            });
        });

        // Page switching
        function switchPage(page) {
            document.querySelectorAll('[id^="view-"]').forEach(el => el.classList.add('hidden'));
            const view = document.getElementById(`view-${page}`);
            if (view) view.classList.remove('hidden');
        }

        updateTransform();
    </script>
</body>
</html>
