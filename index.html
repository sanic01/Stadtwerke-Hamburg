            <!-- VIEW: STADTPLAN / VERSORGUNGSNETZ (Stufe 1+) MIT VEKTORKARTE -->
            <div id="view-stadtplan" class="hidden max-w-7xl mx-auto">
                <div class="bg-white rounded-3xl border border-slate-200 shadow-xl overflow-hidden mb-6">
                    <div class="bg-gradient-to-r from-swBlue-900 to-swBlue-800 px-6 py-8 text-white">
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                            <div>
                                <h2 class="text-xl sm:text-2xl font-extrabold flex items-center space-x-2">
                                    <i class="fa-solid fa-map"></i>
                                    <span>Stadtplan – Versorgungsnetz</span>
                                </h2>
                                <p class="text-sm text-slate-300 mt-1">Interaktive Vektorkarte mit Zoom und Lagenfiltration</p>
                            </div>
                            <div class="bg-swOrange-500 border border-swOrange-600 px-3 py-1.5 rounded-lg text-xs font-semibold self-start sm:self-center">Nur für Mitarbeiter</div>
                        </div>
                    </div>
                </div>

                <div class="flex gap-6">
                    <!-- Main Map Area -->
                    <div class="flex-1 bg-white rounded-2xl border border-slate-200 shadow-lg overflow-hidden relative" style="height: 600px;">
                        <div class="map-container h-full relative" id="mapContainer">
                            <svg id="mapSVG" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
                                <!-- Defs für Gradienten -->
                                <defs>
                                    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" style="stop-color:#e0f2fe;stop-opacity:1" />
                                        <stop offset="100%" style="stop-color:#bae6fd;stop-opacity:1" />
                                    </linearGradient>
                                    <pattern id="gridPattern" x="50" y="50" width="100" height="100" patternUnits="userSpaceOnUse">
                                        <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#e5e7eb" stroke-width="1"/>
                                    </pattern>
                                </defs>

                                <!-- Background -->
                                <g id="backgroundLayer">
                                    <rect width="1000" height="800" fill="url(#gridPattern)"/>
                                    <rect width="1000" height="800" fill="white" opacity="0.3"/>
                                </g>

                                <!-- Wasser -->
                                <g id="waterLayer" class="infrastructure-layer" data-type="wasser">
                                    <path d="M 0 600 Q 250 580 500 590 T 1000 600 L 1000 800 L 0 800 Z" fill="url(#waterGrad)" stroke="#7dd3fc" stroke-width="2" opacity="0.8"/>
                                    <circle cx="200" cy="400" r="80" fill="url(#waterGrad)" stroke="#7dd3fc" stroke-width="1.5" opacity="0.6"/>
                                </g>

                                <!-- Parks -->
                                <g id="parkLayer" class="infrastructure-layer" data-type="parks">
                                    <rect x="50" y="50" width="200" height="150" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" rx="10" opacity="0.7"/>
                                    <rect x="700" y="100" width="250" height="200" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" rx="10" opacity="0.7"/>
                                    <circle cx="850" cy="450" r="60" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>
                                </g>

                                <!-- Straßen -->
                                <g id="roadsLayer" class="infrastructure-layer" data-type="strassen">
                                    <line x1="0" y1="300" x2="1000" y2="300" stroke="#fbbf24" stroke-width="8" opacity="0.8"/>
                                    <line x1="500" y1="0" x2="500" y2="800" stroke="#fbbf24" stroke-width="7" opacity="0.8"/>
                                    <line x1="0" y1="150" x2="1000" y2="150" stroke="#f59e0b" stroke-width="6" opacity="0.7"/>
                                    <line x1="200" y1="0" x2="200" y2="800" stroke="#f59e0b" stroke-width="5" opacity="0.7"/>
                                    <line x1="0" y1="450" x2="600" y2="450" stroke="#fed7aa" stroke-width="3" opacity="0.6"/>
                                    <line x1="300" y1="0" x2="300" y2="600" stroke="#fed7aa" stroke-width="3" opacity="0.6"/>
                                </g>

                                <!-- Stromleitung -->
                                <g id="stromLayer" class="infrastructure-layer" data-type="strom" stroke="#f59e0b" stroke-width="3" fill="none" opacity="0.8" stroke-dasharray="5,5">
                                    <path d="M 100 200 Q 300 150 500 200 T 900 200"/>
                                    <path d="M 150 250 Q 350 300 550 250 T 950 250"/>
                                    <path d="M 50 350 L 950 350"/>
                                    <circle cx="250" cy="200" r="4" fill="#f59e0b"/>
                                    <circle cx="500" cy="200" r="4" fill="#f59e0b"/>
                                    <circle cx="750" cy="200" r="4" fill="#f59e0b"/>
                                </g>

                                <!-- Wasserleitung -->
                                <g id="wasserLayer" class="infrastructure-layer" data-type="wasser-leitung" stroke="#0284c7" stroke-width="2.5" fill="none" opacity="0.8">
                                    <path d="M 50 150 L 200 150 L 200 400 L 900 400"/>
                                    <path d="M 100 300 L 600 300 L 600 500"/>
                                    <path d="M 300 100 L 300 700"/>
                                    <circle cx="200" cy="150" r="3.5" fill="#0284c7"/>
                                    <circle cx="600" cy="300" r="3.5" fill="#0284c7"/>
                                    <circle cx="300" cy="400" r="3.5" fill="#0284c7"/>
                                </g>

                                <!-- Kanalisation -->
                                <g id="kanalLayer" class="infrastructure-layer" data-type="kanal" stroke="#6b7280" stroke-width="2.5" fill="none" opacity="0.8" stroke-dasharray="3,3">
                                    <path d="M 0 500 Q 250 480 500 500 T 1000 500"/>
                                    <path d="M 150 350 L 850 350 L 850 600"/>
                                    <circle cx="400" cy="500" r="3.5" fill="#6b7280"/>
                                    <circle cx="850" cy="475" r="3.5" fill="#6b7280"/>
                                </g>

                                <!-- Fernwärme -->
                                <g id="waermeLayer" class="infrastructure-layer" data-type="fernwaerme" stroke="#ef4444" stroke-width="2.5" fill="none" opacity="0.8" stroke-dasharray="2,4">
                                    <path d="M 300 50 L 300 200 L 700 200 L 700 650"/>
                                    <path d="M 600 100 L 600 250"/>
                                    <circle cx="300" cy="100" r="3.5" fill="#ef4444"/>
                                    <circle cx="700" cy="250" r="3.5" fill="#ef4444"/>
                                </g>

                                <!-- Telekommunikation -->
                                <g id="telekomLayer" class="infrastructure-layer" data-type="telekom" stroke="#a855f7" stroke-width="2.5" fill="none" opacity="0.8" stroke-dasharray="1,5">
                                    <path d="M 50 100 L 950 100 L 950 550"/>
                                    <path d="M 400 50 L 400 700"/>
                                    <circle cx="250" cy="100" r="3.5" fill="#a855f7"/>
                                    <circle cx="950" cy="300" r="3.5" fill="#a855f7"/>
                                </g>

                                <!-- Marker -->
                                <g id="markersLayer">
                                    <circle cx="300" cy="250" r="8" fill="#ef4444" stroke="white" stroke-width="2" class="marker normal" data-id="1" data-label="Hauptstraße 45"/>
                                    <circle cx="600" cy="400" r="8" fill="#3b82f6" stroke="white" stroke-width="2" class="marker normal" data-id="2" data-label="Nebenstraße 12"/>
                                    <circle cx="750" cy="300" r="8" fill="#10b981" stroke="white" stroke-width="2" class="marker completed" data-id="3" data-label="Ausgetauscht"/>
                                </g>
                            </svg>
                        </div>

                        <!-- Zoom Controls -->
                        <div class="absolute top-6 right-6 flex flex-col gap-2 z-40">
                            <div class="zoom-controls">
                                <button class="zoom-btn" onclick="zoomMap(1.2)" title="Vergrößern">
                                    <i class="fa-solid fa-plus"></i>
                                </button>
                                <button class="zoom-btn" onclick="zoomMap(0.8)" title="Verkleinern">
                                    <i class="fa-solid fa-minus"></i>
                                </button>
                                <button class="zoom-btn" onclick="resetZoom()" title="Zurücksetzen">
                                    <i class="fa-solid fa-expand"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Legend & Filter Panel -->
                    <div class="w-80 bg-white rounded-2xl border border-slate-200 shadow-lg p-6 overflow-y-auto custom-scrollbar" style="max-height: 600px;">
                        <h3 class="text-lg font-bold text-slate-900 mb-6 flex items-center gap-2">
                            <i class="fa-solid fa-layer-group text-blue-600"></i>
                            Legendenfilter
                        </h3>

                        <div class="space-y-3">
                            <label class="legend-toggle flex items-center gap-3 cursor-pointer p-3 rounded-xl hover:bg-slate-50 transition" data-layer="roadsLayer">
                                <input type="checkbox" checked class="w-5 h-5 text-yellow-500 rounded cursor-pointer">
                                <div class="flex-1 min-w-0">
                                    <p class="font-semibold text-slate-900 text-sm">Straßen & Wege</p>
                                    <p class="text-xs text-slate-500">Hauptstraßen und Nebenstraßen</p>
                                </div>
                            </label>

                            <label class="legend-toggle flex items-center gap-3 cursor-pointer p-3 rounded-xl hover:bg-slate-50 transition" data-layer="stromLayer">
                                <input type="checkbox" checked class="w-5 h-5 text-amber-500 rounded cursor-pointer">
                                <div class="flex-1 min-w-0">
                                    <p class="font-semibold text-slate-900 text-sm">Stromleitung</p>
                                    <p class="text-xs text-slate-500">Hochspannung & Verteilung</p>
                                </div>
                            </label>

                            <label class="legend-toggle flex items-center gap-3 cursor-pointer p-3 rounded-xl hover:bg-slate-50 transition" data-layer="wasserLayer">
                                <input type="checkbox" checked class="w-5 h-5 text-blue-500 rounded cursor-pointer">
                                <div class="flex-1 min-w-0">
                                    <p class="font-semibold text-slate-900 text-sm">Wasserversorgung</p>
                                    <p class="text-xs text-slate-500">Leitungsnetz Trinkwasser</p>
                                </div>
                            </label>

                            <label class="legend-toggle flex items-center gap-3 cursor-pointer p-3 rounded-xl hover:bg-slate-50 transition" data-layer="kanalLayer">
                                <input type="checkbox" checked class="w-5 h-5 text-gray-500 rounded cursor-pointer">
                                <div class="flex-1 min-w-0">
                                    <p class="font-semibold text-slate-900 text-sm">Kanalisation</p>
                                    <p class="text-xs text-slate-500">Abwassernetz & Entwässerung</p>
                                </div>
                            </label>

                            <label class="legend-toggle flex items-center gap-3 cursor-pointer p-3 rounded-xl hover:bg-slate-50 transition" data-layer="waermeLayer">
                                <input type="checkbox" checked class="w-5 h-5 text-red-500 rounded cursor-pointer">
                                <div class="flex-1 min-w-0">
                                    <p class="font-semibold text-slate-900 text-sm">Fernwärme</p>
                                    <p class="text-xs text-slate-500">Heizungsversorgung</p>
                                </div>
                            </label>

                            <label class="legend-toggle flex items-center gap-3 cursor-pointer p-3 rounded-xl hover:bg-slate-50 transition" data-layer="telekomLayer">
                                <input type="checkbox" checked class="w-5 h-5 text-purple-500 rounded cursor-pointer">
                                <div class="flex-1 min-w-0">
                                    <p class="font-semibold text-slate-900 text-sm">Telekommunikation</p>
                                    <p class="text-xs text-slate-500">Internet & Breitbandnetz</p>
                                </div>
                            </label>

                            <label class="legend-toggle flex items-center gap-3 cursor-pointer p-3 rounded-xl hover:bg-slate-50 transition" data-layer="waterLayer">
                                <input type="checkbox" checked class="w-5 h-5 text-cyan-500 rounded cursor-pointer">
                                <div class="flex-1 min-w-0">
                                    <p class="font-semibold text-slate-900 text-sm">Gewässer</p>
                                    <p class="text-xs text-slate-500">Elbe, Kanäle, Seen</p>
                                </div>
                            </label>

                            <label class="legend-toggle flex items-center gap-3 cursor-pointer p-3 rounded-xl hover:bg-slate-50 transition" data-layer="parkLayer">
                                <input type="checkbox" checked class="w-5 h-5 text-green-500 rounded cursor-pointer">
                                <div class="flex-1 min-w-0">
                                    <p class="font-semibold text-slate-900 text-sm">Parks & Grünflächen</p>
                                    <p class="text-xs text-slate-500">Öffentliche Grünanlagen</p>
                                </div>
                            </label>
                        </div>

                        <div class="mt-8 pt-6 border-t border-slate-200">
                            <h4 class="font-semibold text-slate-900 text-sm mb-4">Markierungen</h4>
                            <div class="space-y-3">
                                <div class="flex items-center gap-3">
                                    <div class="w-4 h-4 rounded-full bg-red-500 border border-white shadow"></div>
                                    <span class="text-xs text-slate-600">Normaler Punkt</span>
                                </div>
                                <div class="flex items-center gap-3">
                                    <div class="w-4 h-4 rounded-full bg-blue-500 border border-white shadow"></div>
                                    <span class="text-xs text-slate-600">Störung / Arbeit</span>
                                </div>
                                <div class="flex items-center gap-3">
                                    <div class="w-4 h-4 rounded-full bg-green-500 border border-white shadow"></div>
                                    <span class="text-xs text-slate-600">Fertiggestellt</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
